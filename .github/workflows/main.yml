name: Android CI

on:
  workflow_dispatch:
  push:
    branches: [ master ]
  pull_request:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest ]
    env:
      CCACHE_COMPILERCHECK: '%compiler% -dumpmachine; %compiler% -dumpversion'
      CCACHE_NOHASHDIR: 'true'
      CCACHE_HARDLINK: 'true'
      CCACHE_BASEDIR: '${{ github.workspace }}'

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'
        fetch-depth: 0

    - name: Write key
      if: github.event_name != 'pull_request' && github.ref == 'refs/heads/master'
      run: |
        if [ ! -z "${{ secrets.KEY_STORE }}" ]; then
          echo "androidStorePassword='${{ secrets.KEY_STORE_PASSWORD }}'" >> gradle.properties
          echo "androidKeyAlias='${{ secrets.ALIAS }}'" >> gradle.properties
          echo "androidKeyPassword='${{ secrets.KEY_PASSWORD }}'" >> gradle.properties
          echo "androidStoreFile='key.jks'" >> gradle.properties
          echo "${{ secrets.KEY_STORE }}" | base64 --decode > key.jks
        fi

    - name: Checkout libxposed/api
      uses: actions/checkout@v4
      with:
        repository: libxposed/api
        path: libxposed/api

    - name: Checkout libxposed/service
      uses: actions/checkout@v4
      with:
        repository: libxposed/service
        path: libxposed/service

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: |
          21
          17
        distribution: 'temurin'
        cache: 'gradle'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Set up ccache
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        max-size: 2G
        key: ${{ runner.os }}
        restore-keys: ${{ runner.os }}
        save: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}

    - name: Build dependencies
      run: |
        # Используем переменную JAVA_HOME_21_X64, которую создает actions/setup-java
        export JAVA_HOME=$JAVA_HOME_21_X64
        
        echo "Building libxposed API with Java 21..."
        cd libxposed/api
        chmod +x gradlew
        ./gradlew :api:publishApiPublicationToMavenLocal -Pkotlin.jvm.target.validation.mode=ignore
        
        cd ../service
        echo "Building libxposed Service with Java 21..."
        chmod +x gradlew
        ./gradlew :interface:publishInterfacePublicationToMavenLocal -Pkotlin.jvm.target.validation.mode=ignore
        cd ../..

    - name: Build with Gradle
      run: |
        echo 'org.gradle.parallel=true' >> gradle.properties
        echo 'org.gradle.jvmargs=-Xmx2048m' >> gradle.properties
        echo 'android.native.buildOutput=verbose' >> gradle.properties
        ./gradlew buildAll -Pkotlin.jvm.target.validation.mode=ignore

    - name: Upload Debug artifact
      uses: actions/upload-artifact@v4
      with:
        name: lspatch-debug
        path: out/debug/*

    - name: Upload Release artifact
      uses: actions/upload-artifact@v4
      with:
        name: lspatch-release
        path: out/release/*

    - name: Upload mappings
      uses: actions/upload-artifact@v4
      with:
        name: mappings
        path: |
          patch-loader/build/outputs/mapping
          manager/build/outputs/mapping

    - name: Upload symbols
      uses: actions/upload-artifact@v4
      with:
        name: symbols
        path: patch-loader/build/symbols
